<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZenithPay</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

    <!-- SPLASH -->
    <div id="splash" class="splash">
        <div class="splash-box">
            <h1>ZenithPay</h1>
            <p>Smart banking for everyone</p>
            <div class="loader"></div>
        </div>
    </div>

    <!-- LOGIN -->
    <div id="loginPage" class="container hidden">
        <div class="header">
            <h2>ZenithPay</h2>
            <span class="badge">✓ Secured</span>
        </div>

        <div class="banner">
            <div>
                <span class="tag">🎉 Limited Offer</span>
                <h3>Get <span class="gold">₦6,000</span> Free</h3>
                <p>No deposits required</p>
            </div>
            <div class="timer">
                <span class="label">Ends in</span>
                <span class="time" id="timerDisplay">02:47</span>
            </div>
        </div>

        <div class="card">
            <h4>Create your account</h4>
            <p class="sub">Join thousands of Nigerians</p>

            <form id="signupForm">
                <div class="field">
                    <label>Full Name</label>
                    <input type="text" id="fullname" placeholder="e.g., Chidi Okafor" required />
                </div>
                <div class="field">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="080 1234 5678" required />
                </div>
                <div class="field">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required />
                </div>
                <div class="field">
                    <label>Occupation</label>
                    <input type="text" id="bvn" placeholder="Business man/woman" required />
                </div>
                <div class="row">
                    <div class="field half">
                        <label>Bank Name</label>
                        <input type="text" id="bank" placeholder="e.g., GTBank" required />
                    </div>
                    <div class="field half">
                        <label>Account Number</label>
                        <input type="text" id="account" placeholder="0123456789" required />
                    </div>
                </div>

                <div class="checkbox">
                    <input type="checkbox" id="terms" required />
                    <label for="terms">I agree to the Terms & Privacy Policy</label>
                </div>

                <button type="submit" id="submitBtn">Open Account</button>
            </form>

            <div class="footer-text">🔒 Your data is encrypted and secure</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
